<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOM Longshot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M7 3H3v4M17 3h4v4M21 17v4h-4M7 21H3v-4" />
            <rect x="7" y="7" width="10" height="10" rx="1" />
          </svg>
        </span>
        <div>
          <h1>DOM Longshot</h1>
          <p>网页元素长截图</p>
        </div>
        <span class="format">PNG</span>
      </header>

      <section class="intro">
        <p class="eyebrow">CAPTURE ELEMENT</p>
        <h2>完整截取一个 DOM</h2>
        <p class="description">超出屏幕的部分会自动分段拼接。</p>
        <div class="preview" aria-hidden="true">
          <div class="preview-bar"><i></i><i></i><i></i></div>
          <div class="preview-lines">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="scan-frame">
            <b></b><b></b><b></b><b></b>
          </div>
          <div class="preview-crop">DOM</div>
        </div>
      </section>

      <button id="select" type="button">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6" />
        </svg>
        开始选择
        <span class="button-arrow" aria-hidden="true">&#8594;</span>
      </button>
      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
